<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SaleSniper{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <a class="navbar-brand" href="#">SaleSniper</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dashboard') }}">📊 Análise de ICP</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('segmentacao') }}">🎯 Segmentação</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('metas_funil') }}">📈 Metas & Projeções</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('valuation') }}">💰 Valuation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('churn') }}">🔮 Previsão de Churn</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('tamsamsom') }}">🎯 TAM/SAM/SOM</a>
                    </li>
                    {% if user == 'admin' %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin') }}">⚙️ Administração</a>
                    </li>
                    {% endif %}
                </ul>
                <span class="navbar-text">👤 {{ user }}</span>
                <a class="btn btn-outline-light ms-2" href="{{ url_for('logout') }}">📤 Sair</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
